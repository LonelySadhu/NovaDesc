# Development override: hot reload, exposed ports, no prod optimizations
services:
  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  celery-worker:
    command: celery -A core.celery_app worker --loglevel=debug --concurrency=2
    volumes:
      - ./backend:/app

  celery-beat:
    volumes:
      - ./backend:/app

  frontend:
    build:
      target: builder
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (UI)
